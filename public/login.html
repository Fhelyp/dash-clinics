<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · Dashboard S-Pragel</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#060810; --card:#0f1623; --border:rgba(255,255,255,.06);
    --purple:#a855f7; --blue:#3b82f6; --white:#f1f5f9; --gray:#475569; --gray-l:#94a3b8;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:20px;
    background-image:radial-gradient(circle at 20% 20%,rgba(168,85,247,.08),transparent 60%),radial-gradient(circle at 80% 80%,rgba(59,130,246,.06),transparent 60%);}
  .box{background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:38px 36px;width:100%;max-width:380px;
    box-shadow:0 30px 60px rgba(0,0,0,.5);}
  h1{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px;
    background:linear-gradient(130deg,#fff 30%,var(--purple) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .sub{font-size:12px;color:var(--gray-l);margin-bottom:28px;}
  label{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;color:var(--gray-l);margin-bottom:7px;margin-top:14px;}
  label:first-of-type{margin-top:0;}
  input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);
    color:var(--white);font-family:'Sora',sans-serif;font-size:13px;
    padding:11px 13px;border-radius:8px;outline:none;transition:border-color .2s;}
  input:focus{border-color:var(--purple);}
  button{width:100%;margin-top:22px;background:linear-gradient(90deg,var(--purple),var(--blue));
    color:#fff;border:none;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;
    padding:12px;border-radius:8px;cursor:pointer;letter-spacing:.02em;transition:opacity .2s;}
  button:hover{opacity:.9;}
  button:disabled{opacity:.5;cursor:not-allowed;}
  .err{margin-top:14px;font-size:11.5px;color:#fca5a5;
    background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);
    padding:10px 12px;border-radius:8px;display:none;}
  .err.on{display:block;}
  .foot{margin-top:24px;font-size:10.5px;color:var(--gray);text-align:center;}
  .foot strong{color:var(--gray-l);}
</style>
</head>
<body>
  <div class="box">
    <h1>Dashboard S-Pragel</h1>
    <div class="sub">Acesse com seu e-mail autorizado.</div>
    <form id="f" autocomplete="on">
      <label for="email">E-mail</label>
      <input id="email" name="email" type="email" autocomplete="username" required>
      <label for="password">Senha</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button id="btn" type="submit">Entrar</button>
      <div id="err" class="err"></div>
    </form>
    <div class="foot">Acesso restrito · <strong>S-Pragel</strong></div>
  </div>

<script>
const f = document.getElementById('f');
const btn = document.getElementById('btn');
const err = document.getElementById('err');

f.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.classList.remove('on');
  btn.disabled = true; btn.textContent = 'Entrando…';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      })
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      err.textContent = data.error === 'invalid_credentials'
        ? 'E-mail ou senha inválidos.'
        : 'Não foi possível entrar. Tente novamente.';
      err.classList.add('on');
      return;
    }
    if (data.user && data.user.must_change_password) {
      window.location.href = '/change-password.html';
    } else {
      window.location.href = '/';
    }
  } catch (_) {
    err.textContent = 'Erro de conexão.';
    err.classList.add('on');
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar';
  }
});
</script>
</body>
</html>
