<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trocar senha · Dashboard de Clínicas</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#060810;--card:#0f1623;--border:rgba(255,255,255,.06);--purple:#a855f7;--blue:#3b82f6;--white:#f1f5f9;--gray:#475569;--gray-l:#94a3b8;}
  body.light{--bg:#f0f2f7;--card:#ffffff;--border:rgba(0,0,0,.08);--white:#1e293b;--gray:#94a3b8;--gray-l:#475569;}
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;transition:background .3s,color .3s;}
  .box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:38px 36px;width:100%;max-width:400px;box-shadow:0 30px 60px rgba(0,0,0,.5);}
  body.light .box{box-shadow:0 8px 32px rgba(15,22,35,.08);}
  h1{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px;}
  .sub{font-size:12px;color:var(--gray-l);margin-bottom:24px;}
  label{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-l);margin-bottom:7px;margin-top:14px;}
  label:first-of-type{margin-top:0;}
  input{width:100%;background:rgba(0,0,0,.02);border:1px solid var(--border);color:var(--white);font-family:'Sora',sans-serif;font-size:13px;padding:11px 13px;border-radius:8px;outline:none;}
  body:not(.light) input{background:rgba(255,255,255,.04);}
  input:focus{border-color:var(--purple);}
  button{width:100%;margin-top:22px;background:linear-gradient(90deg,var(--purple),var(--blue));color:#fff;border:none;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;padding:12px;border-radius:8px;cursor:pointer;}
  button:disabled{opacity:.5;cursor:not-allowed;}
  .msg{margin-top:14px;font-size:11.5px;padding:10px 12px;border-radius:8px;display:none;}
  .msg.on{display:block;}
  .msg.err{color:#dc2626;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.22);}
  .msg.ok{color:#059669;background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.22);}
  body:not(.light) .msg.err{color:#fca5a5;background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25);}
  body:not(.light) .msg.ok{color:#6ee7b7;background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.25);}
  .theme-tog{position:fixed;top:18px;right:18px;width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gray-l);}
</style>
</head>
<body class="light">
  <button class="theme-tog" onclick="toggleTheme()" title="Alternar tema">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
  <div class="box">
    <h1>Trocar senha</h1>
    <div class="sub">Defina uma senha forte (mín. 8 caracteres).</div>
    <form id="f" autocomplete="off">
      <label>Senha atual</label>
      <input id="old" type="password" required>
      <label>Nova senha</label>
      <input id="new1" type="password" required minlength="8">
      <label>Confirmar nova senha</label>
      <input id="new2" type="password" required minlength="8">
      <button id="btn" type="submit">Salvar</button>
      <div id="msg" class="msg"></div>
    </form>
  </div>
<script>
function applyTheme(){const t=localStorage.getItem('dc_theme')||'light';document.body.classList.toggle('light',t==='light');}
function toggleTheme(){const t=document.body.classList.contains('light')?'dark':'light';localStorage.setItem('dc_theme',t);applyTheme();}
applyTheme();
const f=document.getElementById('f'),btn=document.getElementById('btn'),msg=document.getElementById('msg');
f.addEventListener('submit',async(e)=>{
  e.preventDefault(); msg.className='msg';
  const o=document.getElementById('old').value,n1=document.getElementById('new1').value,n2=document.getElementById('new2').value;
  if(n1!==n2){msg.textContent='As senhas não coincidem.';msg.className='msg err on';return;}
  btn.disabled=true;btn.textContent='Salvando…';
  try{
    const r=await fetch('/api/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({oldPassword:o,newPassword:n1})});
    const d=await r.json().catch(()=>({}));
    if(!r.ok){msg.textContent=d.error==='invalid_old_password'?'Senha atual incorreta.':d.error==='weak_password'?'Senha muito fraca.':'Erro ao salvar.';msg.className='msg err on';return;}
    msg.textContent='Senha alterada. Redirecionando…';msg.className='msg ok on';
    setTimeout(()=>location.href='/',900);
  }catch(_){msg.textContent='Erro de conexão.';msg.className='msg err on';}
  finally{btn.disabled=false;btn.textContent='Salvar';}
});
</script>
</body>
</html>
