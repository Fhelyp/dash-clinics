<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: dark card com bordas arredondadas -->
  <rect width="32" height="32" rx="7" fill="#0f0f15"/>

  <!-- Linha de base sutil -->
  <line x1="4" y1="27" x2="28" y2="27" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Barras ascendentes (3 colunas) com gradiente e brilho -->
  <rect x="4"  y="21" width="7" height="6" rx="2" fill="url(#grad)" opacity="0.55" filter="url(#glow)"/>
  <rect x="13" y="15" width="7" height="12" rx="2" fill="url(#grad)" opacity="0.75" filter="url(#glow)"/>
  <rect x="22" y="7"  width="7" height="20" rx="2" fill="url(#grad)" filter="url(#glow)"/>

  <!-- Ponto de destaque no topo da barra maior -->
  <circle cx="25.5" cy="6.5" r="2" fill="#a855f7" opacity="0.9"/>
  <circle cx="25.5" cy="6.5" r="1" fill="#ffffff" opacity="0.8"/>
</svg>
